<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy English Window</title>
    <link href="https://fonts.googleapis.com/css2?family=Merriweather:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Merriweather', serif;
            background-color: #fdfbf7;
        }

        .window-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #fdfbf7 0%, #f5f1e8 100%);
        }

        .window-frame {
            position: relative;
            width: 90%;
            max-width: 900px;
            aspect-ratio: 4 / 3;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(141, 123, 104, 0.15);
            background-color: #fdfbf7;
        }

        .background-image {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        .grid-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(6, 1fr);
            gap: 0;
            z-index: 2;
        }

        .grid-cell {
            position: relative;
            background: rgba(230, 222, 203, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 1.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            cursor: pointer;
            overflow: hidden;
        }

        .grid-cell.revealed {
            background: transparent;
            backdrop-filter: blur(0px);
            border-color: transparent;
            pointer-events: none;
        }

        .grid-cell::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.2) 0%, rgba(141, 123, 104, 0.05) 100%);
            pointer-events: none;
            z-index: 1;
        }

        .grid-cell.revealed::before {
            display: none;
        }

        .ui-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 30px;
            background: linear-gradient(to top, rgba(253, 251, 247, 0.98), transparent);
            z-index: 3;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
        }

        .day-counter {
            font-size: 14px;
            color: #8d7b68;
            font-weight: 300;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .day-counter.completed {
            color: #d4a574;
        }

        .study-button {
            padding: 14px 40px;
            font-size: 16px;
            font-family: 'Merriweather', serif;
            background-color: #8d7b68;
            color: #fdfbf7;
            border: 2px solid #8d7b68;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            font-weight: 400;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(141, 123, 104, 0.1);
        }

        .study-button:hover:not(:disabled) {
            background-color: #a89a87;
            border-color: #a89a87;
            box-shadow: 0 6px 20px rgba(141, 123, 104, 0.2);
            transform: translateY(-2px);
        }

        .study-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .study-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .reset-button {
            padding: 14px 40px;
            font-size: 16px;
            font-family: 'Merriweather', serif;
            background-color: #d4a574;
            color: #fdfbf7;
            border: 2px solid #d4a574;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            font-weight: 400;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(212, 165, 116, 0.15);
        }

        .reset-button:hover {
            background-color: #e6b887;
            border-color: #e6b887;
            box-shadow: 0 6px 20px rgba(212, 165, 116, 0.25);
            transform: translateY(-2px);
        }

        .reset-button:active {
            transform: translateY(0);
        }

        .feedback-message {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 28px;
            color: #8d7b68;
            font-weight: 300;
            letter-spacing: 2px;
            opacity: 0;
            pointer-events: none;
            z-index: 100;
            animation: fadeInOut 2.5s ease-in-out forwards;
            text-align: center;
        }

        @keyframes fadeInOut {
            0% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
            20% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            80% {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.95);
            }
        }

        .completion-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(253, 251, 247, 0.95);
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 30px;
            z-index: 200;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.5s ease-in-out forwards;
        }

        .completion-overlay.active {
            display: flex;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .completion-message {
            font-size: 36px;
            color: #8d7b68;
            font-weight: 300;
            letter-spacing: 1px;
            text-align: center;
            max-width: 500px;
            line-height: 1.6;
        }

        .completion-message .emoji {
            font-size: 48px;
            display: block;
            margin-bottom: 20px;
        }

        @media (max-width: 768px) {
            .window-frame {
                width: 95%;
                border-radius: 15px;
            }

            .ui-container {
                padding: 20px;
                gap: 12px;
            }

            .study-button,
            .reset-button {
                padding: 12px 30px;
                font-size: 14px;
            }

            .day-counter {
                font-size: 12px;
            }

            .completion-message {
                font-size: 28px;
            }

            .completion-message .emoji {
                font-size: 40px;
            }
        }

        @media (max-width: 480px) {
            .window-frame {
                aspect-ratio: 3 / 4;
            }

            .grid-overlay {
                grid-template-columns: repeat(5, 1fr);
                grid-template-rows: repeat(6, 1fr);
            }

            .ui-container {
                padding: 15px;
            }

            .study-button,
            .reset-button {
                padding: 10px 25px;
                font-size: 13px;
            }

            .day-counter {
                font-size: 11px;
            }
        }

        .title-section {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 4;
            pointer-events: none;
        }

        .title {
            font-size: 18px;
            color: #8d7b68;
            font-weight: 300;
            letter-spacing: 1px;
        }

        .subtitle {
            font-size: 12px;
            color: #a89a87;
            font-weight: 300;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        @media (max-width: 768px) {
            .title-section {
                top: 15px;
                left: 15px;
            }

            .title {
                font-size: 16px;
            }

            .subtitle {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>
    <div class="window-container">
        <div class="window-frame">
            <div class="background-image"></div>
            <div class="title-section">
                <div class="title">Cozy English Window</div>
                <div class="subtitle">30-Day Study Challenge</div>
            </div>
            <div class="grid-overlay" id="gridOverlay"></div>
            <div class="ui-container">
                <div class="day-counter" id="dayCounter">Day 1 / 30</div>
                <button class="study-button" id="studyButton">Study Done</button>
            </div>
        </div>
    </div>

    <div class="feedback-message" id="feedbackMessage"></div>
    <div class="completion-overlay" id="completionOverlay">
        <div class="completion-message">
            <span class="emoji">☕</span>
            <span>Your window is now clear. You've completed the 30-day challenge!</span>
        </div>
        <button class="reset-button" id="resetButton">Start a New Window</button>
    </div>

    <script>
        // Configuration
        const TOTAL_DAYS = 30;
        const GRID_COLS = 5;
        const GRID_ROWS = 6;
        const STORAGE_KEYS = {
            currentDay: 'cozyWindow_currentDay',
            backgroundImage: 'cozyWindow_backgroundImage',
            revealedCells: 'cozyWindow_revealedCells',
            lastStudyDate: 'cozyWindow_lastStudyDate'
        };

        // Image keywords for variety
        const imageKeywords = [
            'cozy room morning',
            'warm coffee interior',
            'soft sunlight window',
            'peaceful morning scene',
            'comfortable reading nook',
            'cat sleeping cozy',
            'book and coffee',
            'warm bedroom morning',
            'soft natural light',
            'peaceful home interior'
        ];

        // State
        let currentDay = 1;
        let revealedCells = new Set();
        let backgroundImageUrl = '';

        // Initialize application
        function init() {
            loadState();
            setupGrid();
            loadBackgroundImage();
            updateUI();
            attachEventListeners();
        }

        // Load state from localStorage
        function loadState() {
            const savedDay = localStorage.getItem(STORAGE_KEYS.currentDay);
            const savedImage = localStorage.getItem(STORAGE_KEYS.backgroundImage);
            const savedCells = localStorage.getItem(STORAGE_KEYS.revealedCells);

            currentDay = savedDay ? parseInt(savedDay) : 1;
            backgroundImageUrl = savedImage || '';
            revealedCells = savedCells ? new Set(JSON.parse(savedCells)) : new Set();
        }

        // Save state to localStorage
        function saveState() {
            localStorage.setItem(STORAGE_KEYS.currentDay, currentDay.toString());
            localStorage.setItem(STORAGE_KEYS.backgroundImage, backgroundImageUrl);
            localStorage.setItem(STORAGE_KEYS.revealedCells, JSON.stringify(Array.from(revealedCells)));
        }

        // Setup grid cells
        function setupGrid() {
            const gridOverlay = document.getElementById('gridOverlay');
            gridOverlay.innerHTML = '';

            for (let i = 0; i < TOTAL_DAYS; i++) {
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                cell.id = `cell-${i}`;

                if (revealedCells.has(i)) {
                    cell.classList.add('revealed');
                }

                gridOverlay.appendChild(cell);
            }
        }

        // Load background image
        function loadBackgroundImage() {
            if (!backgroundImageUrl) {
                generateNewImage();
            } else {
                applyBackgroundImage(backgroundImageUrl);
            }
        }

        // Generate new random image from Unsplash
        function generateNewImage() {
            const keyword = imageKeywords[Math.floor(Math.random() * imageKeywords.length)];
            const randomSeed = Math.random().toString(36).substring(7);
            const imageUrl = `https://source.unsplash.com/900x675/?${keyword}&${randomSeed}`;

            backgroundImageUrl = imageUrl;
            saveState();
            applyBackgroundImage(imageUrl);
        }

        // Apply background image
        function applyBackgroundImage(url) {
            const bgElement = document.querySelector('.background-image');
            bgElement.style.backgroundImage = `url('${url}')`;
        }

        // Update UI
        function updateUI() {
            const dayCounter = document.getElementById('dayCounter');
            const studyButton = document.getElementById('studyButton');

            if (currentDay > TOTAL_DAYS) {
                dayCounter.textContent = 'Challenge Complete!';
                dayCounter.classList.add('completed');
                studyButton.style.display = 'none';
                showCompletionOverlay();
            } else {
                dayCounter.textContent = `Day ${currentDay} / ${TOTAL_DAYS}`;
                dayCounter.classList.remove('completed');
                studyButton.style.display = 'block';
                studyButton.disabled = isAlreadyStudiedToday();
            }
        }

        // Check if already studied today
        function isAlreadyStudiedToday() {
            const lastStudyDate = localStorage.getItem(STORAGE_KEYS.lastStudyDate);
            if (!lastStudyDate) return false;

            const today = new Date().toDateString();
            return lastStudyDate === today;
        }

        // Record study session
        function recordStudySession() {
            const today = new Date().toDateString();
            localStorage.setItem(STORAGE_KEYS.lastStudyDate, today);
        }

        // Reveal cell
        function revealCell(cellIndex) {
            if (revealedCells.has(cellIndex)) return;

            revealedCells.add(cellIndex);
            const cell = document.getElementById(`cell-${cellIndex}`);
            
            // Trigger reflow to ensure animation plays
            void cell.offsetWidth;
            cell.classList.add('revealed');

            saveState();
            recordStudySession();
            showFeedbackMessage();

            // Move to next day
            if (currentDay < TOTAL_DAYS) {
                currentDay++;
                saveState();
                updateUI();
            } else if (currentDay === TOTAL_DAYS) {
                currentDay++;
                saveState();
                updateUI();
            }
        }

        // Show feedback message
        function showFeedbackMessage() {
            const messages = [
                'Relax...',
                'Good job today',
                'Well done',
                'Keep going',
                'You\'re doing great',
                'Breathe...',
                'Wonderful',
                'Beautiful progress'
            ];

            const message = messages[Math.floor(Math.random() * messages.length)];
            const feedbackElement = document.getElementById('feedbackMessage');
            feedbackElement.textContent = message;
            feedbackElement.style.animation = 'none';

            // Trigger reflow
            void feedbackElement.offsetWidth;
            feedbackElement.style.animation = 'fadeInOut 2.5s ease-in-out forwards';
        }

        // Show completion overlay
        function showCompletionOverlay() {
            const overlay = document.getElementById('completionOverlay');
            overlay.classList.add('active');
        }

        // Hide completion overlay
        function hideCompletionOverlay() {
            const overlay = document.getElementById('completionOverlay');
            overlay.classList.remove('active');
        }

        // Reset progress
        function resetProgress() {
            currentDay = 1;
            revealedCells.clear();
            backgroundImageUrl = '';
            localStorage.removeItem(STORAGE_KEYS.currentDay);
            localStorage.removeItem(STORAGE_KEYS.backgroundImage);
            localStorage.removeItem(STORAGE_KEYS.revealedCells);
            localStorage.removeItem(STORAGE_KEYS.lastStudyDate);

            generateNewImage();
            setupGrid();
            updateUI();
            hideCompletionOverlay();
        }

        // Attach event listeners
        function attachEventListeners() {
            const studyButton = document.getElementById('studyButton');
            const resetButton = document.getElementById('resetButton');

            studyButton.addEventListener('click', () => {
                if (currentDay <= TOTAL_DAYS) {
                    revealCell(currentDay - 1);
                }
            });

            resetButton.addEventListener('click', resetProgress);

            // Prevent default behavior on grid cells
            document.getElementById('gridOverlay').addEventListener('click', (e) => {
                e.preventDefault();
            });
        }

        // Start the application
        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
