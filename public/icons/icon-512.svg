<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gem512" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="glow512">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="512" height="512" rx="100" fill="url(#bg512)"/>
  <!-- Crystal / gem shape -->
  <polygon points="256,50 420,165 380,405 132,405 92,165" fill="url(#gem512)" filter="url(#glow512)"/>
  <!-- Top highlight -->
  <polygon points="256,50 420,165 256,200" fill="white" opacity="0.18"/>
  <!-- Inner shadow bottom -->
  <polygon points="256,200 420,165 380,405 132,405 92,165" fill="black" opacity="0.12"/>
  <!-- XP text -->
  <text x="256" y="325" text-anchor="middle" fill="white"
    font-family="Arial Black, Arial, sans-serif"
    font-size="112" font-weight="900" letter-spacing="-3"
    filter="url(#glow512)">XP</text>
  <!-- Sub label -->
  <text x="256" y="388" text-anchor="middle" fill="#c084fc"
    font-family="Arial, sans-serif"
    font-size="38" font-weight="700" letter-spacing="3">ダメージ</text>
</svg>
