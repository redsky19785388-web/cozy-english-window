<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <defs>
    <linearGradient id="bg192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b"/>
      <stop offset="100%" style="stop-color:#0f172a"/>
    </linearGradient>
    <linearGradient id="gem192" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="50%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#4c1d95"/>
    </linearGradient>
    <filter id="glow192">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background rounded rect -->
  <rect width="192" height="192" rx="40" fill="url(#bg192)"/>
  <!-- Crystal / gem shape -->
  <polygon points="96,18 158,62 142,152 50,152 34,62" fill="url(#gem192)" filter="url(#glow192)"/>
  <!-- Top highlight -->
  <polygon points="96,18 158,62 96,76" fill="white" opacity="0.18"/>
  <!-- Inner shadow bottom -->
  <polygon points="96,76 158,62 142,152 50,152 34,62" fill="black" opacity="0.12"/>
  <!-- XP text -->
  <text x="96" y="122" text-anchor="middle" fill="white"
    font-family="Arial Black, Arial, sans-serif"
    font-size="42" font-weight="900" letter-spacing="-1"
    filter="url(#glow192)">XP</text>
  <!-- Sub label -->
  <text x="96" y="148" text-anchor="middle" fill="#c084fc"
    font-family="Arial, sans-serif"
    font-size="14" font-weight="700" letter-spacing="1">ダメージ</text>
</svg>
